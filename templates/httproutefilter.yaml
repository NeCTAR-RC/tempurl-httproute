{{- $ := . -}}
{{- range $rw := .Values.rewrites }}
{{- $filterName := include "tempurl-httproute.filterName" (dict "root" $ "rewrite" $rw) }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: {{ $filterName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "tempurl-httproute.labels" $ | nindent 4 }}
spec:
  urlRewrite:
    hostname:
      type: Backend
    path:
      type: ReplaceRegexMatch
      replaceRegexMatch:
        pattern: {{ printf "^/%s/([^?]+)(?:\\?(.*))?$" $rw.path | quote }}
        # The refresh Job/CronJob owns this field: it patches in the signed
        # Swift TempURL post-install, then daily before the signature expires.
        # Re-apply whatever value is live so upgrades never fight that owner
        # (server-side apply only conflicts on differing values). The
        # placeholder is used on fresh installs and offline renders
        # (`helm template`), where lookup returns nothing.
        {{- $live := lookup "gateway.envoyproxy.io/v1alpha1" "HTTPRouteFilter" $.Release.Namespace $filterName | default dict }}
        substitution: {{ dig "spec" "urlRewrite" "path" "replaceRegexMatch" "substitution" "/__pending_refresh__" $live | quote }}
{{- end }}
