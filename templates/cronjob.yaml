{{- $fullname := include "tempurl-httproute.fullname" . -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $fullname }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tempurl-httproute.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.refresh.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      {{- include "tempurl-httproute.refreshJobSpec" . | nindent 6 }}
